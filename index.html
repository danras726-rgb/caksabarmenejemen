<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SateGule Dashboard Mgt</title>
    
    <!-- React & ReactDOM (UMD Build) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel (Untuk transpile JSX di browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* CSS Global untuk memastikan SEMUA scrollbar konsisten dengan tema Dark Mode */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px; /* Untuk scrollbar horizontal pada tabel */
        }
        ::-webkit-scrollbar-track {
            background: #0d0e12; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e1f28; 
            border-radius: 10px;
            border: 2px solid #0d0e12; /* Memberikan jarak dengan track */
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2a2b36; 
        }

        /* Styling spesifik untuk input date agar icon kalender terlihat di dark mode */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }

        /* Animasi */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-[#0d0e12] text-slate-200 selection:bg-purple-500/30 overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- KOMPONEN IKON (Menggantikan import lucide-react) ---
        // Karena ini file HTML tunggal, kita definisikan SVG manual agar tidak error modul
        const Icon = ({ path, size=20, className="" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: path}} />
        );

        const Icons = {
            LayoutDashboard: (props) => <Icon path='<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>' {...props} />,
            ArrowRightLeft: (props) => <Icon path='<path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/>' {...props} />,
            FileText: (props) => <Icon path='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' {...props} />,
            Utensils: (props) => <Icon path='<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>' {...props} />,
            CalendarDays: (props) => <Icon path='<path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/>' {...props} />,
            Beef: (props) => <Icon path='<circle cx="12.5" cy="8.5" r="2.5"/><path d="M12.5 2a6.5 6.5 0 0 0-6.22 4.6c-1.1 3.13-.78 3.9-3.18 6.08A3 3 0 0 0 5 18c4 0 8.4-1.8 11.4-4.3A6.5 6.5 0 0 0 12.5 2Z"/><path d="m18.5 6 2.19 4.5a6.48 6.48 0 0 1 .31 2 6.49 6.49 0 0 1-2.6 5.2C16.9 19 14.7 22 12 22a3 3 0 0 1-2.68-1.66L8.4 19.5"/>' {...props} />,
            Plus: (props) => <Icon path='<path d="M5 12h14"/><path d="M12 5v14"/>' {...props} />,
            TrendingUp: (props) => <Icon path='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' {...props} />,
            TrendingDown: (props) => <Icon path='<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>' {...props} />,
            DollarSign: (props) => <Icon path='<line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>' {...props} />,
            Briefcase: (props) => <Icon path='<rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' {...props} />,
            Search: (props) => <Icon path='<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>' {...props} />,
            Bell: (props) => <Icon path='<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>' {...props} />,
            User: (props) => <Icon path='<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' {...props} />,
            CheckCircle: (props) => <Icon path='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>' {...props} />,
            Clock: (props) => <Icon path='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' {...props} />,
            LogOut: (props) => <Icon path='<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>' {...props} />,
            X: (props) => <Icon path='<path d="M18 6 6 18"/><path d="m6 6 12 12"/>' {...props} />,
            Trash2: (props) => <Icon path='<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>' {...props} />,
            Activity: (props) => <Icon path='<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>' {...props} />,
            Printer: (props) => <Icon path='<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/>' {...props} />,
            ChevronRight: (props) => <Icon path='<path d="m9 18 6-6-6-6"/>' {...props} />,
            MoreHorizontal: (props) => <Icon path='<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>' {...props} />,
            BarChart3: (props) => <Icon path='<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>' {...props} />,
            Package: (props) => <Icon path='<line x1="16.5" x2="7.5" y1="9.4" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/>' {...props} />
        };

        // --- BANTUAN TANGGAL & FORMAT ---
        const today = new Date();
        const startOfDay = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const startOfWeek = new Date(today.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1))); 
        startOfWeek.setHours(0,0,0,0);
        const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
        const startOfYear = new Date(today.getFullYear(), 0, 1);

        const formatDate = (dateString, includeTime = false) => {
            if (!dateString) return '-';
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
            if(includeTime) {
                options.hour = '2-digit';
                options.minute = '2-digit';
            }
            return new Date(dateString).toLocaleDateString('id-ID', options);
        };

        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };

        const formatRibuanInput = (value) => {
            const numberStr = String(value).replace(/\D/g, '');
            return numberStr.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const unformatRibuan = (value) => {
            return parseInt(String(value).replace(/\./g, ''), 10) || 0;
        };

        // --- DATA AWAL (MOCK DATA) ---
        const initialTransactions = [];
        const initialCatering = {
            Salsa: { saldo: 0, history: [] },
            Kurnia: { saldo: 0, history: [] }
        };
        const initialOrders = [];
        const initialGoatSuppliers = [
            { id: 1, name: 'Pak Haji Rohman', hutang: 0, lastTx: null },
            { id: 2, name: 'Cak Nur Kambing', hutang: 0, lastTx: null }
        ];

        const menuPackages = [
            { id: 1, name: 'Paket Hemat', price: 'Rp 2.25jt', desc: '1 Ekor, 400 Sate, 1 Panci Gule' },
            { id: 2, name: 'Paket Sedang', price: 'Rp 2.5jt', desc: '1 Ekor, 500 Sate, 1 Panci Gule' },
            { id: 3, name: 'Paket Besar', price: 'Rp 3.0jt', desc: '1 Ekor, 700 Sate, 1.5 Panci Gule' },
            { id: 4, name: 'Jasa Masak', price: 'Rp 850rb', desc: 'Kambing Bawa Sendiri' },
            { id: 5, name: 'Jasa K. Guling', price: 'Rp 1.2jt', desc: 'K. Bawa Sendiri (Bakar & Iris)' },
            { id: 6, name: 'K. Guling (Full)', price: 'Rp 2.5jt', desc: 'Kambing Dari Kami (Beres)' },
            { id: 7, name: 'Layanan Kotakan', price: '+Rp 10rb/box', desc: 'Nasi, Sate, Gule, Acar, Krupuk' },
            { id: 8, name: 'Sate Ayam', price: 'Rp 1rb - 1.2rb/tsk', desc: 'Umum: 1.2rb | Katering: 1rb' },
        ];

        // --- KOMPONEN BANTUAN UI ---
        const Toast = ({ message, isVisible }) => (
            <div className={`fixed top-5 right-5 z-50 transition-all duration-300 transform ${isVisible ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0 pointer-events-none'}`}>
                <div className="bg-[#1e1f28] border border-white/10 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-3 backdrop-blur-md">
                    <Icons.CheckCircle size={20} className="text-purple-400" />
                    <span className="font-medium text-sm tracking-wide">{message}</span>
                </div>
            </div>
        );

        // --- KOMPONEN TAB ---

        const Beranda = ({ stats, transactions, setTab, orders }) => {
            const [filterPesanan, setFilterPesanan] = useState('Semua'); 
            const filteredOrders = orders.filter(o => filterPesanan === 'Semua' ? true : o.status === filterPesanan).slice(0, 5); 

            const chartDataDynamic = useMemo(() => {
                const data = [];
                const days = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
                let maxAmount = 0;

                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    d.setHours(0, 0, 0, 0);
                    const nextDay = new Date(d);
                    nextDay.setDate(d.getDate() + 1);

                    const dayTransactions = transactions.filter(t => {
                        const tDate = new Date(t.date);
                        return tDate >= d && tDate < nextDay && t.type === 'pemasukan';
                    });

                    const totalPemasukan = dayTransactions.reduce((sum, t) => sum + t.amount, 0);
                    if (totalPemasukan > maxAmount) maxAmount = totalPemasukan;

                    data.push({
                        label: days[d.getDay()],
                        fullDate: d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }),
                        amount: totalPemasukan
                    });
                }

                return data.map(item => ({
                    ...item,
                    heightPercent: maxAmount > 0 ? Math.max((item.amount / maxAmount) * 100, item.amount > 0 ? 3 : 0) : 0
                }));
            }, [transactions]);

            return (
                <div className="space-y-8 animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row justify-between md:items-end gap-4">
                        <div>
                            <div className="flex items-center space-x-2 mb-1">
                                <span className="text-xs font-semibold text-slate-500 uppercase tracking-widest bg-white/5 px-2.5 py-1 rounded-full border border-white/5">Ringkasan</span>
                            </div>
                            <h2 className="text-3xl font-medium text-white tracking-tight">Performa Bisnis Utama</h2>
                        </div>
                        <button onClick={() => setTab('transaksi')} className="bg-purple-600 hover:bg-purple-500 text-white px-5 py-2.5 rounded-full text-sm font-semibold flex items-center transition-all shadow-lg shadow-purple-600/20 border border-purple-500/50">
                            <Icons.Plus size={16} className="mr-2"/> Input Transaksi
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                        {[
                            { title: 'Omset Hari Ini', value: stats.hariIni.omset, icon: Icons.TrendingUp, color: 'text-emerald-400', bgIcon: 'bg-emerald-400/10' },
                            { title: 'Pengeluaran Hari Ini', value: stats.hariIni.pengeluaran, icon: Icons.TrendingDown, color: 'text-rose-400', bgIcon: 'bg-rose-400/10' },
                            { title: 'Laba Bersih Hari Ini', value: stats.hariIni.laba, icon: Icons.DollarSign, color: 'text-purple-400', bgIcon: 'bg-purple-400/10' },
                            { title: 'Laba Bulan Ini', value: stats.bulanIni.laba, icon: Icons.Activity, color: 'text-blue-400', bgIcon: 'bg-blue-400/10' }
                        ].map((item, idx) => (
                            <div key={idx} className="bg-[#15161c] rounded-3xl border border-white/5 shadow-xl shadow-black/20 p-6 transform transition duration-300 hover:-translate-y-1 hover:border-white/10 group relative overflow-hidden">
                                <div className="absolute -right-10 -top-10 w-32 h-32 bg-white/5 rounded-full blur-3xl group-hover:bg-purple-500/10 transition-colors"></div>
                                <div className="flex justify-between items-start mb-6 relative z-10">
                                    <div className="flex items-center space-x-3">
                                        <div className={`p-2.5 rounded-xl ${item.bgIcon}`}>
                                            <item.icon size={18} className={item.color} />
                                        </div>
                                        <p className="text-slate-400 text-sm font-medium">{item.title}</p>
                                    </div>
                                    <button className="text-slate-600 hover:text-white transition-colors"><Icons.ChevronRight size={18}/></button>
                                </div>
                                <div className="relative z-10">
                                    <p className="text-xs text-slate-500 mb-1">Total Saldo</p>
                                    <h3 className="text-2xl font-semibold text-white tracking-tight">{formatRupiah(item.value)}</h3>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-[#15161c] rounded-3xl border border-white/5 shadow-xl p-7 flex flex-col justify-between">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h3 className="text-lg font-medium text-white flex items-center"><Icons.BarChart3 size={18} className="mr-2 text-purple-400"/> Grafik Pendapatan</h3>
                                    <p className="text-xs text-slate-500 mt-1">Statistik pemasukan 7 hari terakhir</p>
                                </div>
                                <span className="bg-white/5 border border-white/10 text-slate-300 text-xs font-semibold px-3 py-1.5 rounded-full">7 Hari Terakhir</span>
                            </div>
                            
                            <div className="flex items-end space-x-2 md:space-x-4 h-48 mt-4 relative w-full pt-4">
                                <div className="absolute inset-0 flex flex-col justify-between z-0 pb-6">
                                    <div className="border-b border-white/5 w-full"></div>
                                    <div className="border-b border-white/5 w-full"></div>
                                    <div className="border-b border-white/5 w-full"></div>
                                    <div className="border-b border-white/5 w-full"></div>
                                </div>
                                {chartDataDynamic.map((item, i) => (
                                    <div key={i} className="flex-1 flex flex-col justify-end h-full relative z-10 group cursor-pointer pb-6">
                                        <div className="absolute bottom-full mb-2 left-1/2 transform -translate-x-1/2 bg-[#1e1f28] border border-white/10 text-white text-xs px-3 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all duration-300 shadow-xl shadow-black/50 z-20 whitespace-nowrap pointer-events-none scale-95 group-hover:scale-100 flex flex-col items-center">
                                            <p className="text-[10px] text-slate-400 mb-0.5">{item.fullDate}</p>
                                            <p className="font-semibold text-emerald-400">{formatRupiah(item.amount)}</p>
                                            <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-4 border-transparent border-t-[#1e1f28]"></div>
                                        </div>
                                        <div className="absolute inset-x-1 bottom-6 top-0 bg-white/[0.02] rounded-t-lg group-hover:bg-white/[0.04] transition-colors border border-white/[0.02]"></div>
                                        <div className="relative mx-1 bg-gradient-to-t from-purple-600/20 via-purple-500/60 to-purple-400 rounded-t-lg transition-all duration-500 group-hover:shadow-[0_0_20px_rgba(168,85,247,0.6)] group-hover:from-purple-500 group-hover:to-purple-300 flex flex-col justify-start" style={{ height: `${item.heightPercent}%` }}>
                                            {item.amount > 0 && <div className="w-full h-1 bg-white/70 rounded-t-lg shadow-[0_0_5px_rgba(255,255,255,0.8)]"></div>}
                                        </div>
                                        <div className="absolute bottom-0 inset-x-0 text-center text-xs text-slate-500 font-medium group-hover:text-purple-300 transition-colors">{item.label}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-gradient-to-b from-[#251545] to-[#120a26] rounded-3xl border border-purple-500/20 shadow-2xl shadow-purple-900/20 p-8 flex flex-col relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-purple-500/20 rounded-full blur-[80px] mix-blend-screen pointer-events-none"></div>
                            <div className="absolute bottom-0 left-0 w-40 h-40 bg-indigo-500/20 rounded-full blur-[60px] mix-blend-screen pointer-events-none"></div>
                            <div className="flex justify-between items-start mb-6 relative z-10">
                                <div className="flex items-center space-x-2">
                                    <Icons.Utensils size={18} className="text-white"/>
                                    <span className="font-bold text-white tracking-wide">SateGule<sup className="text-purple-400">®</sup></span>
                                </div>
                                <span className="bg-purple-500 text-white text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-widest">Tahunan</span>
                            </div>
                            <div className="relative z-10 mb-8">
                                <h3 className="text-2xl font-medium text-white mb-3">Ringkasan Portofolio</h3>
                                <p className="text-purple-200/60 text-sm leading-relaxed">Pantau total akumulasi aset dan pertumbuhan bisnis Anda secara menyeluruh dalam tahun ini.</p>
                            </div>
                            <div className="space-y-4 relative z-10 mt-auto">
                                <div className="bg-black/20 p-4 rounded-2xl border border-white/5 backdrop-blur-sm">
                                    <p className="text-purple-200/60 text-xs mb-1">Total Omset</p>
                                    <p className="text-lg font-semibold text-emerald-400">{formatRupiah(stats.tahunIni.omset)}</p>
                                </div>
                                <div className="bg-black/20 p-4 rounded-2xl border border-white/5 backdrop-blur-sm flex justify-between items-center">
                                    <div>
                                        <p className="text-purple-200/60 text-xs mb-1">Laba Bersih</p>
                                        <p className="text-xl font-semibold text-white">{formatRupiah(stats.tahunIni.laba)}</p>
                                    </div>
                                    <div className="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center border border-purple-500/30">
                                        <Icons.TrendingUp size={16} className="text-purple-300"/>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-[#15161c] rounded-3xl border border-white/5 shadow-xl p-7 flex flex-col">
                            <div className="flex flex-col sm:flex-row justify-between sm:items-center mb-6 gap-4">
                                <h3 className="text-lg font-medium text-white flex items-center"><Icons.Package size={18} className="mr-2 text-purple-400"/> Daftar Pesanan Terkini</h3>
                                <div className="flex bg-[#0d0e12] p-1 rounded-xl border border-white/5">
                                    {['Semua', 'Pending', 'Selesai'].map(f => (
                                        <button key={f} onClick={() => setFilterPesanan(f)} className={`px-4 py-1.5 text-xs font-semibold rounded-lg transition-colors ${filterPesanan === f ? 'bg-white/10 text-white shadow' : 'text-slate-500 hover:text-slate-300'}`}>{f}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="space-y-3 flex-grow">
                                {filteredOrders.length === 0 ? (
                                    <div className="text-slate-500 text-sm flex flex-col items-center justify-center py-10 bg-[#0d0e12] rounded-2xl border border-dashed border-white/5 h-full">
                                        <Icons.Package size={32} className="mb-3 opacity-20"/> Tidak ada pesanan di kategori ini.
                                    </div>
                                ) : (
                                    filteredOrders.map(order => (
                                        <div key={order.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-[#0d0e12] rounded-2xl border border-white/5 hover:border-white/10 transition-colors gap-4">
                                            <div className="flex items-start space-x-4">

                                                <span className="font-medium text-slate-300 text-sm">{formatRupiah(order.total)}</span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                            <div className="mt-4 text-center">
                                <button onClick={() => setTab('jadwal_pesanan')} className="text-xs text-purple-400 hover:text-purple-300 font-medium flex items-center justify-center w-full bg-white/5 py-2.5 rounded-xl transition-colors">Lihat Seluruh Jadwal Pesanan <Icons.ChevronRight size={14} className="ml-1"/></button>
                            </div>
                        </div>

                        <div className="bg-[#15161c] rounded-3xl border border-white/5 shadow-xl p-7 flex flex-col">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-lg font-medium text-white flex items-center"><Icons.Activity size={18} className="mr-2 text-emerald-400"/> Aktivitas Terakhir</h3>
                            </div>
                            <div className="space-y-3 flex-grow overflow-hidden">
                                {transactions.slice(0, 5).map((t, idx) => (
                                    <div key={t.id} className="flex items-center justify-between p-3.5 bg-[#0d0e12] rounded-2xl border border-white/5 hover:border-white/10 transition-colors">
                                        <div className="flex items-center space-x-3">
                                            <div className={`p-2.5 rounded-xl ${t.type === 'pemasukan' ? 'bg-emerald-500/10 text-emerald-400' : t.type === 'pengeluaran' ? 'bg-rose-500/10 text-rose-400' : t.type === 'hutang_kambing' ? 'bg-blue-500/10 text-blue-400' : 'bg-purple-500/10 text-purple-400'}`}>
                                                {t.type === 'pemasukan' ? <Icons.TrendingUp size={16} /> : t.type === 'pengeluaran' ? <Icons.TrendingDown size={16} /> : t.type === 'hutang_kambing' ? <Icons.Beef size={16} /> : <Icons.Briefcase size={16}/>}
                                            </div>
                                            <div>
                                                <p className="font-medium text-slate-200 text-xs tracking-wide line-clamp-1">{t.desc}</p>
                                                <p className="text-[10px] text-slate-500 mt-0.5">{formatDate(t.date, true)}</p>
                                            </div>
                                        </div>
                                        <span className={`font-semibold tracking-wide text-xs whitespace-nowrap pl-2 ${t.type === 'pemasukan' ? 'text-emerald-400' : t.type === 'pengeluaran' ? 'text-rose-400' : t.type === 'hutang_kambing' ? 'text-blue-400' : 'text-purple-400'}`}>
                                            {t.type === 'pemasukan' ? '+' : t.type === 'pengeluaran' ? '-' : ''}{formatRupiah(t.amount)}
                                        </span>
                                    </div>
                                ))}
                                {transactions.length === 0 && <div className="text-slate-500 text-sm flex flex-col items-center justify-center py-10 bg-[#0d0e12] rounded-2xl border border-dashed border-white/5 h-full"><Icons.Activity size={32} className="mb-3 opacity-20"/>Belum ada transaksi aktif.</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Transaksi = ({ transactions, setTransactions, showToast }) => {
            const [form, setForm] = useState({ type: 'pemasukan', amount: '', desc: '' });

            const handleAddTransaction = (e) => {
                e.preventDefault();
                const numAmount = unformatRibuan(form.amount);
                if (!numAmount || !form.desc) return;
                const newTx = { id: Date.now(), date: new Date().toISOString(), type: form.type, amount: numAmount, desc: form.desc };
                setTransactions([newTx, ...transactions]);
                setForm({ type: 'pemasukan', amount: '', desc: '' });
                showToast('Transaksi berhasil dicatat!');
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div>
                        <h2 className="text-2xl font-medium text-white tracking-tight">Kasir & Transaksi</h2>
                        <p className="text-sm text-slate-400 mt-1">Catat uang masuk dan keluar operasional warung.</p>
                    </div>
                    <div className="bg-[#15161c] rounded-3xl border border-white/5 shadow-xl p-6 md:p-8">
                        <div className="flex items-center justify-between mb-8 pb-4 border-b border-white/5">
                            <h3 className="text-lg font-medium text-white">Form Input Transaksi</h3>
                            <div className="bg-purple-500/10 p-2 rounded-xl text-purple-400"><Icons.Plus size={20}/></div>
                        </div>
                        <form onSubmit={handleAddTransaction} className="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                            <div className="md:col-span-3">
                                <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2">Jenis Arus Kas</label>
                                <select className="w-full p-4 bg-[#0d0e12] border border-[#2a2b36] rounded-2xl focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 outline-none appearance-none font-medium text-slate-200 transition-all" value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                                    <option value="pemasukan">Uang Masuk (+)</option>
                                    <option value="pengeluaran">Uang Keluar (-)</option>
                                </select>
                            </div>
                            <div className="md:col-span-4">
                                <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2">Nominal (Rp)</label>
                                <input type="text" className="w-full p-4 bg-[#0d0e12] border border-[#2a2b36] rounded-2xl focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 outline-none font-medium text-white transition-all placeholder-slate-600" placeholder="0" value={form.amount} onChange={e => setForm({...form, amount: formatRibuanInput(e.target.value)})} />
                            </div>
                            <div className="md:col-span-5">
                                <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2">Keterangan Catatan</label>
                                <div className="flex space-x-3">
                                    <input type="text" className="flex-1 p-4 bg-[#0d0e12] border border-[#2a2b36] rounded-2xl focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 outline-none font-medium text-white transition-all placeholder-slate-600" placeholder="Cth: Beli bumbu, bayar listrik..." value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} />
                                    <button type="submit" className="bg-purple-600 hover:bg-purple-500 text-white px-8 rounded-2xl font-semibold transition-all shadow-lg shadow-purple-900/20">Simpan</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const Laporan = ({ transactions, searchTerm, setSearchTerm }) => {
            const [receiptData, setReceiptData] = useState(null);
            const filteredTx = transactions.filter(t => t.desc.toLowerCase().includes(searchTerm.toLowerCase()) || t.amount.toString().includes(searchTerm.replace(/\./g, '')));

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    {receiptData && (
                        <div className="fixed inset-0 bg-[#0d0e12]/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <style>{`@media print { body * { visibility: hidden; } .print-area, .print-area * { visibility: visible; } .print-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 20px; background: white; color: black; } }`}</style>
                            <div className="bg-[#15161c] border border-white/10 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl flex flex-col relative">
                                <div className="p-8 flex-1 print-area bg-white">
                                    <div className="text-center mb-6 pb-6 border-b-2 border-dashed border-slate-200">
                                        <h2 className="text-2xl font-black text-slate-800">SATE GULE.</h2>
                                        <p className="text-sm text-slate-500">Bukti Transaksi Kasir</p>
                                    </div>
                                    <div className="space-y-3 text-sm text-slate-600 mb-6">
                                        <div className="flex justify-between"><span className="text-slate-400">Tanggal</span> <span className="font-medium text-slate-800">{formatDate(receiptData.date)}</span></div>
                                        <div className="flex justify-between"><span className="text-slate-400">Waktu</span> <span className="font-medium text-slate-800">{new Date(receiptData.date).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</span></div>
                                        <div className="flex justify-between"><span className="text-slate-400">Jenis</span> <span className="font-medium text-slate-800">{receiptData.type.toUpperCase().replace('_', ' ')}</span></div>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-100">
                                        <p className="text-xs text-slate-400 mb-1">Keterangan Item</p>
                                        <p className="font-bold text-slate-800">{receiptData.desc}</p>
                                    </div>
                                    <div className="flex justify-between items-center pt-4 border-t-2 border-dashed border-slate-200">
                                        <span className="font-bold text-slate-500">Total Nominal</span>
                                        <span className={`text-xl font-black ${receiptData.type === 'pemasukan' ? 'text-emerald-600' : receiptData.type === 'pengeluaran' ? 'text-rose-600' : receiptData.type === 'hutang_kambing' ? 'text-blue-600' : 'text-purple-600'}`}>
                                            {receiptData.type === 'pemasukan' ? '+' : receiptData.type === 'pengeluaran' ? '-' : ''}{formatRupiah(receiptData.amount)}
                                        </span>
                                    </div>
                                </div>
                                <div className="p-4 flex gap-3 bg-[#0d0e12] border-t border-white/5">
                                    <button onClick={() => setReceiptData(null)} className="flex-1 py-3 text-slate-300 bg-white/5 border border-white/10 hover:bg-white/10 rounded-xl font-semibold transition-colors">Tutup</button>
                                    <button onClick={() => window.print()} className="flex-1 py-3 text-white bg-purple-600 hover:bg-purple-500 rounded-xl font-semibold flex items-center justify-center transition-colors shadow-lg shadow-purple-900/20"><Icons.Printer size={18} className="mr-2" /> Cetak</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
                        <div>
                            <h2 className="text-2xl font-medium text-white tracking-tight">Buku Besar Transaksi</h2>
                            <p className="text-sm text-slate-400 mt-1">Seluruh riwayat keuangan terekam di sini termasuk history Katering & Kambing.</p>
                        </div>
                        <div className="relative w-full md:w-80">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <Icons.Search size={18} className="text-slate-500" />
                            </div>
                            <input type="text" placeholder="Cari transaksi..." className="w-full pl-12 pr-4 py-3 bg-[#15161c] border border-white/5 rounded-full focus:ring-2 focus:ring-purple-500/50 outline-none text-sm text-white placeholder-slate-500 shadow-lg shadow-black/10 transition-all" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>
                    </div>

                    <div className="bg-[#15161c] rounded-3xl border border-white/5 shadow-xl overflow-hidden">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse min-w-max">
                                <thead>
                                    <tr className="bg-[#0d0e12] border-b border-white/5 text-slate-500 text-xs uppercase tracking-widest font-medium">
                                        <th className="p-5">Tanggal & Waktu</th>
                                        <th className="p-5">Tipe</th>
                                        <th className="p-5">Keterangan</th>
                                        <th className="p-5 text-right">Nominal</th>
                                        <th className="p-5 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5">
                                    {filteredTx.map((t) => (
                                        <tr key={t.id} className="hover:bg-white/[0.02] transition-colors group">
                                            <td className="p-5 text-sm whitespace-nowrap">
                                                <div className="font-medium text-slate-200">{new Date(t.date).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year:'numeric'})}</div>
                                                <div className="text-xs text-slate-500 mt-0.5">{new Date(t.date).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</div>
                                            </td>
                                            <td className="p-5">
                                                <span className={`inline-flex items-center px-3 py-1.5 rounded-full text-xs font-semibold border ${t.type === 'pemasukan' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : t.type === 'pengeluaran' ? 'bg-rose-500/10 text-rose-400 border-rose-500/20' : t.type === 'hutang_kambing' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 'bg-purple-500/10 text-purple-400 border-purple-500/20'}`}>
                                                    {t.type === 'pemasukan' ? <Icons.TrendingUp size={12} className="mr-1.5"/> : t.type === 'pengeluaran' ? <Icons.TrendingDown size={12} className="mr-1.5"/> : t.type === 'hutang_kambing' ? <Icons.Beef size={12} className="mr-1.5"/> : <Icons.Briefcase size={12} className="mr-1.5"/>}
                                                    {t.type.toUpperCase().replace('_', ' ')}
                                                </span>
                                            </td>
                                            <td className="p-5 text-sm text-slate-300 font-medium">{t.desc}</td>
                                            <td className={`p-5 text-sm font-semibold text-right whitespace-nowrap tracking-wide ${t.type === 'pemasukan' ? 'text-emerald-400' : t.type === 'pengeluaran' ? 'text-rose-400' : t.type === 'hutang_kambing' ? 'text-blue-400' : 'text-purple-400'}`}>
                                                {t.type === 'pemasukan' ? '+' : t.type === 'pengeluaran' ? '-' : ''}{formatRupiah(t.amount)}
                                            </td>
                                            <td className="p-5 text-center">
                                                <button onClick={() => setReceiptData(t)} className="p-2 text-slate-500 hover:text-purple-400 hover:bg-purple-500/10 rounded-xl transition-all" title="Lihat Bukti"><Icons.FileText size={18} /></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredTx.length === 0 && <tr><td colSpan="5" className="p-10 text-center text-slate-500">Pencarian tidak menemukan hasil.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const KeuanganKatering = ({ catering, setCatering, transactions, setTransactions, orders, showToast }) => {
            const [selectedKatering, setSelectedKatering] = useState(Object.keys(catering)[0] || null);
            const [isAddingMitra, setIsAddingMitra] = useState(false);
            const [newMitraName, setNewMitraName] = useState('');
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [katTxType, setKatTxType] = useState('deposit'); 
            const [amountInput, setAmountInput] = useState('');
            const [descInput, setDescInput] = useState('');
            const [rightTab, setRightTab] = useState('history');

            const handleAddMitra = (e) => {
                e.preventDefault();
                if(!newMitraName.trim()) return;
                if(catering[newMitraName]) return showToast('Nama mitra sudah ada!');
                setCatering(prev => ({ ...prev, [newMitraName]: { saldo: 0, history: [] } }));
                setSelectedKatering(newMitraName); setNewMitraName(''); setIsAddingMitra(false);
                showToast(`Mitra ${newMitraName} berhasil ditambahkan.`);
            };

            const handleDeleteMitra = (mitra) => {
                if (confirmDelete === mitra) {
                    const newCatering = { ...catering }; delete newCatering[mitra]; setCatering(newCatering);
                    setConfirmDelete(null);
                    if (selectedKatering === mitra) setSelectedKatering(Object.keys(newCatering).length > 0 ? Object.keys(newCatering)[0] : null);
                    showToast(`Mitra ${mitra} dihapus.`);
                } else {
                    setConfirmDelete(mitra); setTimeout(() => setConfirmDelete(null), 3000); 
                }
            };

            const handleTx = (e) => {
                e.preventDefault();
                const amount = unformatRibuan(amountInput);
                if (!amount) return;
                const isDeposit = katTxType === 'deposit';
                if (!isDeposit && catering[selectedKatering].saldo < amount) return showToast('Saldo katering tidak mencukupi!');

                const newHistory = { id: Date.now(), date: new Date().toISOString(), type: katTxType, amount: amount, desc: descInput || (isDeposit ? 'Deposit Dana / Bayar DP' : 'Potong Saldo untuk Pesanan') };
                setCatering(prev => ({ ...prev, [selectedKatering]: { saldo: isDeposit ? prev[selectedKatering].saldo + amount : prev[selectedKatering].saldo - amount, history: [newHistory, ...prev[selectedKatering].history] } }));

                setTransactions([{ id: Date.now() + 1, date: new Date().toISOString(), type: isDeposit ? 'pemasukan' : 'potong_saldo', amount: amount, desc: isDeposit ? `Deposit Dana Katering ${selectedKatering}` : `Potong Saldo Katering ${selectedKatering}` }, ...transactions]);
                setAmountInput(''); setDescInput(''); showToast(isDeposit ? `Deposit berhasil dicatat.` : `Saldo dipotong.`);
            };

            const linkedOrders = orders.filter(o => o.source === `Katering ${selectedKatering}`);

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div>
                        <h2 className="text-2xl font-medium text-white tracking-tight">Manajemen Mitra Katering</h2>
                        <p className="text-sm text-slate-400 mt-1">Kelola mitra, deposit uang muka, dan rekap pesanan mereka.</p>
                    </div>

                    <div className="flex flex-wrap gap-2 p-2 bg-[#15161c] rounded-2xl w-fit items-center border border-white/5 shadow-sm">
                        {Object.keys(catering).map(kat => (
                            <div key={kat} className="relative group flex items-center">
                                <button onClick={() => setSelectedKatering(kat)} className={`px-5 py-2 rounded-xl font-medium text-sm transition-all flex items-center ${selectedKatering === kat ? 'bg-purple-600 text-white shadow-lg pr-10' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>Katering {kat}</button>
                                {selectedKatering === kat && (
                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteMitra(kat); }} className={`absolute right-1.5 p-1 rounded-lg text-white transition-all ${confirmDelete === kat ? 'bg-rose-500 animate-pulse' : 'bg-black/20 hover:bg-rose-500'}`} title={confirmDelete === kat ? "Yakin hapus?" : "Hapus Mitra"}>
                                        {confirmDelete === kat ? <Icons.Trash2 size={14} /> : <Icons.X size={14} />}
                                    </button>
                                )}
                            </div>
                        ))}
                        {isAddingMitra ? (
                            <form onSubmit={handleAddMitra} className="flex items-center space-x-1 ml-2 bg-[#0d0e12] p-1 rounded-xl border border-white/10">
                                <input autoFocus type="text" value={newMitraName} onChange={e => setNewMitraName(e.target.value)} placeholder="Nama Mitra..." className="w-32 text-sm px-3 py-1.5 outline-none font-medium text-white bg-transparent" />
                                <button type="submit" className="bg-emerald-500 text-[#0d0e12] p-1.5 rounded-lg hover:bg-emerald-400"><Icons.CheckCircle size={16}/></button>
                                <button type="button" onClick={() => setIsAddingMitra(false)} className="bg-white/10 text-slate-300 p-1.5 rounded-lg hover:bg-white/20"><Icons.X size={16}/></button>
                            </form>
                        ) : (
                            <button onClick={() => setIsAddingMitra(true)} className="ml-2 px-4 py-2 rounded-xl font-medium text-sm text-purple-400 bg-purple-500/10 hover:bg-purple-500/20 flex items-center transition-all border border-purple-500/20"><Icons.Plus size={16} className="mr-1.5"/> Tambah Mitra</button>
                        )}
                    </div>

                    {!selectedKatering ? (
                        <div className="bg-[#15161c] rounded-3xl p-12 text-center border border-white/5 shadow-xl">
                            <Icons.Briefcase size={56} className="mx-auto text-slate-600 mb-4" />
                            <h3 className="text-xl font-medium text-slate-300">Belum Ada Mitra Katering</h3>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="bg-[#15161c] rounded-3xl border border-white/5 shadow-xl p-8 flex flex-col justify-between relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-40 h-40 bg-purple-500/10 rounded-full blur-[60px] pointer-events-none"></div>
                                <div>
                                    <div className="flex justify-between items-center mb-6"><h3 className="text-slate-400 text-xs font-semibold uppercase tracking-widest">Saldo Deposit Aktif</h3><Icons.Briefcase size={18} className="text-purple-400" /></div>
                                    <p className="text-4xl font-semibold text-white mb-2 tracking-tight">{formatRupiah(catering[selectedKatering].saldo)}</p>
                                    <p className="text-xs text-slate-500">Saldo ini dapat dipotong saat ada pesanan masuk.</p>
                                </div>
                                <div className="mt-8 pt-6 border-t border-white/5 relative z-10">
                                    <form onSubmit={handleTx} className="space-y-4">
                                        <div className="flex rounded-xl bg-[#0d0e12] p-1 border border-white/5">
                                            <button type="button" onClick={() => setKatTxType('deposit')} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-colors ${katTxType === 'deposit' ? 'bg-white/10 text-white shadow' : 'text-slate-500 hover:text-slate-300'}`}>+ Deposit</button>
                                            <button type="button" onClick={() => setKatTxType('pesanan')} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-colors ${katTxType === 'pesanan' ? 'bg-purple-500 text-white shadow' : 'text-slate-500 hover:text-slate-300'}`}>- Potong Saldo</button>
                                        </div>
                                        <div className="space-y-3">
                                            <input type="text" value={amountInput} onChange={(e) => setAmountInput(formatRibuanInput(e.target.value))} placeholder="Nominal (Rp)" className="w-full p-4 rounded-2xl bg-[#0d0e12] border border-[#2a2b36] text-white placeholder-slate-600 outline-none focus:ring-2 focus:ring-purple-500/50 font-medium transition-all" />
                                            <input type="text" value={descInput} onChange={(e) => setDescInput(e.target.value)} placeholder="Keterangan opsional..." className="w-full p-4 rounded-2xl bg-[#0d0e12] border border-[#2a2b36] text-white placeholder-slate-600 outline-none focus:ring-2 focus:ring-purple-500/50 text-sm transition-all" />
                                            <button type="submit" className={`w-full py-4 rounded-2xl font-semibold transition-all shadow-lg flex justify-center items-center ${katTxType === 'deposit' ? 'bg-emerald-500 hover:bg-emerald-400 text-[#0d0e12]' : 'bg-purple-600 hover:bg-purple-500 text-white shadow-purple-900/20'}`}>Eksekusi</button>
                                        </div>

                                <div className="flex border-b border-white/5 bg-[#1a1b23]">
                                    <button onClick={() => setRightTab('history')} className={`flex-1 p-4 font-semibold text-sm tracking-wide transition-colors border-b-2 ${rightTab === 'history' ? 'text-white border-purple-500 bg-white/5' : 'text-slate-500 border-transparent hover:text-slate-300'}`}>Riwayat Saldo</button>
                                    <button onClick={() => setRightTab('orders')} className={`flex-1 p-4 font-semibold text-sm tracking-wide transition-colors flex justify-center items-center space-x-2 border-b-2 ${rightTab === 'orders' ? 'text-white border-purple-500 bg-white/5' : 'text-slate-500 border-transparent hover:text-slate-300'}`}>
                                        <span>Pesanan Katering</span><span className="bg-purple-500/20 text-purple-400 py-0.5 px-2.5 rounded-full text-xs border border-purple-500/20">{linkedOrders.length}</span>
                                    </button>
                                </div>
                                <div className="p-0 overflow-y-auto custom-scrollbar flex-1 min-h-[320px]">
                                    {rightTab === 'history' && (
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-[#0d0e12] sticky top-0 z-10">
                                                <tr><th className="p-5 font-medium text-slate-400">Tanggal</th><th className="p-5 font-medium text-slate-400">Keterangan</th><th className="p-5 font-medium text-slate-400 text-right">Nominal</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {catering[selectedKatering].history.map(h => (
                                                    <tr key={h.id} className="hover:bg-white/[0.02] transition-colors">
                                                        <td className="p-5 text-slate-300 font-medium">{formatDate(h.date)}</td>
                                                        <td className="p-5 text-slate-400 flex items-center"><span className={`inline-block w-2 h-2 rounded-full mr-3 ${h.type === 'deposit' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-purple-500 shadow-[0_0_8px_rgba(168,85,247,0.5)]'}`}></span>{h.desc}</td>
                                                        <td className={`p-5 font-semibold text-right tracking-wide ${h.type === 'deposit' ? 'text-emerald-400' : 'text-slate-200'}`}>{h.type === 'deposit' ? '+' : '-'}{formatRupiah(h.amount)}</td>
                                                    </tr>
                                                ))}
                                                {catering[selectedKatering].history.length === 0 && <tr><td colSpan="3" className="p-10 text-center text-slate-500">Belum ada riwayat transaksi saldo.</td></tr>}
                                            </tbody>
                                        </table>
                                    )}
                                    {rightTab === 'orders' && (
                                        <div className="p-5 space-y-4">
                                            {linkedOrders.length === 0 ? <div className="text-center py-12"><p className="text-slate-500 font-medium">Belum ada pesanan yang tercatat untuk mitra ini.</p></div> : linkedOrders.map(order => (
                                                <div key={order.id} className="bg-[#0d0e12] border border-white/5 p-5 rounded-2xl flex justify-between items-center hover:border-purple-500/30 transition-colors">
                                                    <div><p className="text-xs text-slate-500 font-medium mb-1.5 flex items-center"><Icons.Clock size={12} className="mr-1.5"/>{formatDate(order.date)}</p><p className="font-medium text-slate-200 text-sm whitespace-pre-wrap">{order.details}</p></div>
                                                    <span className={`text-xs px-3 py-1.5 rounded-full font-semibold uppercase tracking-widest shrink-0 ml-4 border ${order.status === 'Selesai' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : order.status === 'Batal' ? 'bg-rose-500/10 text-rose-400 border-rose-500/20' : 'bg-purple-500/10 text-purple-400 border-purple-500/30 shadow-[0_0_10px_rgba(168,85,247,0.2)]'}`}>{order.status}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const FormTambahPesanan = ({ orders, setOrders, catering, transactions, setTransactions, showToast }) => {
            const [form, setForm] = useState({ date: '', source: Object.keys(catering).length > 0 ? `Katering ${Object.keys(catering)[0]}` : 'Umum / Acara', details: '', namaPemesan: '', noHp: '', dp: '', jenisAcara: 'Aqiqah', namaAqiqah: '' });
            const [selectedPackages, setSelectedPackages] = useState({});
            const [kotakanData, setKotakanData] = useState({ jmlKotak: '', isiSate: '' });
            const [sateAyamQty, setSateAyamQty] = useState('');

            const isUmum = form.source === 'Umum / Acara';

            const handlePackageClick = (pkgName) => setSelectedPackages(prev => ({ ...prev, [pkgName]: (prev[pkgName] || 0) + 1 }));
            const handleRemovePackage = (e, pkgName) => { e.stopPropagation(); setSelectedPackages(prev => { const newPkgs = { ...prev }; if (newPkgs[pkgName] > 1) { newPkgs[pkgName] -= 1; } else { delete newPkgs[pkgName]; } return newPkgs; }); };

            const handleAddOrder = (e) => {
                e.preventDefault();
                const basePrices = { 'Paket Hemat': 2250000, 'Paket Sedang': 2500000, 'Paket Besar': 3000000, 'Jasa Masak': 850000, 'Jasa K. Guling': 1200000, 'K. Guling (Full)': 2500000 };
                let calculatedTotal = 0; let orderItems = [];

                Object.entries(selectedPackages).forEach(([name, btnClickQty]) => {
                    if (basePrices[name]) { calculatedTotal += basePrices[name] * btnClickQty; orderItems.push(`${btnClickQty}x ${name}`); } 
                    else if (name === 'Layanan Kotakan') { const kQty = parseInt(kotakanData.jmlKotak) || 0; calculatedTotal += kQty * 10000; orderItems.push(`Layanan Kotakan (${kQty} Box, ${kotakanData.isiSate || 0} Tsk/Box)`); } 
                    else if (name === 'Sate Ayam') { const sQty = parseInt(sateAyamQty) || 0; calculatedTotal += sQty * (isUmum ? 1200 : 1000); orderItems.push(`${sQty} Tusuk Sate Ayam`); }
                });

                let detailLines = [];
                if (isUmum) { detailLines.push(`Pelanggan: ${form.namaPemesan || '-'} (${form.noHp || '-'})`); detailLines.push(`Acara: ${form.jenisAcara}${form.jenisAcara === 'Aqiqah' && form.namaAqiqah ? ` (Anak: ${form.namaAqiqah})` : ''}`); }
                if (orderItems.length > 0) detailLines.push(`Pesanan: ${orderItems.join(' | ')}`);
                if (form.details) detailLines.push(`Catatan: ${form.details}`);
                const finalDetails = detailLines.join('\n').trim();

                if(!form.date || !finalDetails) return showToast('Tanggal dan (Menu atau Catatan) harus diisi!');

                const dpNum = isUmum ? (unformatRibuan(form.dp) || 0) : 0;
                const newOrder = { id: Date.now(), date: form.date, source: form.source, namaPemesan: form.namaPemesan, details: finalDetails, status: 'Pending', total: calculatedTotal, dp: dpNum };
                setOrders([newOrder, ...orders]);

                if (isUmum && dpNum > 0) setTransactions([{ id: Date.now() + 1, date: new Date().toISOString(), type: 'pemasukan', amount: dpNum, desc: `DP Pesanan: ${form.namaPemesan || 'Umum'}` }, ...transactions]);
                
                setForm({ ...form, details: '', namaPemesan: '', noHp: '', dp: '', namaAqiqah: '' }); setSelectedPackages({}); setKotakanData({ jmlKotak: '', isiSate: '' }); setSateAyamQty(''); showToast('Pesanan baru berhasil ditambahkan!');
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div><h2 className="text-2xl font-medium text-white tracking-tight">Tambah Pesanan Baru</h2><p className="text-sm text-slate-400 mt-1">Input pesanan masuk dari pelanggan umum maupun katering di sini.</p></div>
                    <div className="bg-[#15161c] rounded-3xl border border-white/5 shadow-xl p-6 md:p-8">
                        <form onSubmit={handleAddOrder} className="space-y-6">

                            </div>

                            {isUmum && (
