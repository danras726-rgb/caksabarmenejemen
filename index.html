                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div><label className="block text-xs text-slate-500 mb-1.5">Nama Pemesan</label><input type="text" className="w-full p-3 bg-[#0d0e12] border border-white/5 rounded-xl outline-none focus:ring-1 focus:ring-emerald-500/50 text-sm text-white placeholder-slate-600" value={form.namaPemesan} onChange={e => setForm({...form, namaPemesan: e.target.value})} placeholder="Bpk/Ibu..." /></div>
                                        <div><label className="block text-xs text-slate-500 mb-1.5">Nomor Telepon</label><input type="text" className="w-full p-3 bg-[#0d0e12] border border-white/5 rounded-xl outline-none focus:ring-1 focus:ring-emerald-500/50 text-sm text-white placeholder-slate-600" value={form.noHp} onChange={e => setForm({...form, noHp: e.target.value})} placeholder="08..." /></div>
                                        <div><label className="block text-xs text-slate-500 mb-1.5">Jenis Acara</label><select className="w-full p-3 bg-[#0d0e12] border border-white/5 rounded-xl outline-none focus:ring-1 focus:ring-emerald-500/50 text-sm text-white appearance-none" value={form.jenisAcara} onChange={e => setForm({...form, jenisAcara: e.target.value})}><option value="Aqiqah">Aqiqah</option><option value="Nikahan">Nikahan</option><option value="Lainnya">Lainnya / Keluarga</option></select></div>
                                        <div><label className="block text-xs text-slate-500 mb-1.5">Uang Muka / DP (Rp)</label><input type="text" className="w-full p-3 bg-[#0d0e12] border border-emerald-500/20 rounded-xl outline-none focus:ring-1 focus:ring-emerald-500/50 text-sm font-semibold text-emerald-400 placeholder-emerald-900" value={form.dp} onChange={e => setForm({...form, dp: formatRibuanInput(e.target.value)})} placeholder="0" /></div>
                                        {form.jenisAcara === 'Aqiqah' && (<div className="md:col-span-2"><label className="block text-xs text-slate-500 mb-1.5">Nama Anak (Aqiqah)</label><input type="text" className="w-full p-3 bg-[#0d0e12] border border-white/5 rounded-xl outline-none focus:ring-1 focus:ring-emerald-500/50 text-sm text-white placeholder-slate-600" value={form.namaAqiqah} onChange={e => setForm({...form, namaAqiqah: e.target.value})} placeholder="Tulis nama anak..." /></div>)}
                                    </div>
                                </div>
                            )}

                            <div>
                                <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-3">Pilih Paket Menu</label>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {menuPackages.map(pkg => {
                                        const qty = selectedPackages[pkg.name] || 0;
                                        return (
                                            <div key={pkg.id} className="relative">
                                                <button type="button" onClick={() => handlePackageClick(pkg.name)} className={`w-full p-4 rounded-2xl text-left transition-all h-full min-h-[110px] flex flex-col justify-center border ${qty > 0 ? 'bg-purple-500/10 border-purple-500/50 shadow-[0_0_15px_rgba(168,85,247,0.15)] ring-1 ring-purple-500/50' : 'bg-[#0d0e12] border-[#2a2b36] hover:border-purple-500/30 hover:bg-[#121319]'}`}>
                                                    <span className={`block text-sm font-semibold mb-1 ${qty > 0 ? 'text-purple-300' : 'text-slate-200'}`}>{pkg.name}</span><span className="block text-xs font-medium text-emerald-400 mb-1.5">{pkg.price}</span><span className="block text-[10px] text-slate-500 leading-snug">{pkg.desc}</span>
                                                </button>
                                                {qty > 0 && <div onClick={(e) => handleRemovePackage(e, pkg.name)} className="absolute -top-2 -right-2 bg-purple-600 text-white w-7 h-7 flex items-center justify-center rounded-full text-xs font-bold shadow-lg border-2 border-[#15161c] cursor-pointer hover:bg-rose-500 transition-colors" title="Klik untuk mengurangi">{qty}</div>}
                                            </div>
                                        )
                                    })}
                                </div>

                                {selectedPackages['Layanan Kotakan'] > 0 && (
                                    <div className="mt-4 p-5 bg-[#0d0e12] border border-white/5 rounded-2xl flex flex-col md:flex-row gap-4 items-center animate-fade-in">
                                        <div className="font-semibold text-sm text-slate-300 w-full md:w-auto shrink-0 flex items-center"><Icons.FileText size={16} className="mr-2 text-slate-500"/> Detail Kotakan:</div>
                                        <div className="flex-1 w-full flex space-x-3"><input type="number" placeholder="Jml Kotak" className="w-full p-3 bg-[#15161c] border border-white/5 rounded-xl outline-none focus:border-purple-500/50 text-sm font-medium text-white placeholder-slate-600" value={kotakanData.jmlKotak} onChange={e => setKotakanData({...kotakanData, jmlKotak: e.target.value})} /><input type="number" placeholder="Sate / kotak" className="w-full p-3 bg-[#15161c] border border-white/5 rounded-xl outline-none focus:border-purple-500/50 text-sm font-medium text-white placeholder-slate-600" value={kotakanData.isiSate} onChange={e => setKotakanData({...kotakanData, isiSate: e.target.value})} /></div>
                                    </div>
                                )}
                                {selectedPackages['Sate Ayam'] > 0 && (
                                    <div className="mt-4 p-5 bg-[#0d0e12] border border-white/5 rounded-2xl flex flex-col md:flex-row gap-4 items-center animate-fade-in">
                                        <div className="font-semibold text-sm text-slate-300 w-full md:w-auto shrink-0 flex items-center"><Icons.Utensils size={16} className="mr-2 text-slate-500"/> Sate Ayam:</div>
                                        <div className="flex-1 w-full flex space-x-3 items-center"><input type="number" placeholder="Berapa tusuk?" className="w-full p-3 bg-[#15161c] border border-white/5 rounded-xl outline-none focus:border-purple-500/50 text-sm font-medium text-white placeholder-slate-600" value={sateAyamQty} onChange={e => setSateAyamQty(e.target.value)} /><span className="text-xs font-semibold text-slate-400 whitespace-nowrap bg-white/5 px-3 py-2 rounded-lg border border-white/5">@ {isUmum ? '1.200' : '1.000'}</span></div>
                                    </div>
                                )}
                            </div>

                            <div>
                                <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2">Catatan Tambahan</label>
                                <div className="flex flex-col md:flex-row space-y-3 md:space-y-0 md:space-x-4">
                                    <input type="text" placeholder="Contoh: Jam 4 sore, pedas pisah..." className="flex-1 p-4 bg-[#0d0e12] border border-[#2a2b36] rounded-2xl outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 text-white font-medium transition-all placeholder-slate-600" value={form.details} onChange={e => setForm({...form, details: e.target.value})} />
                                    <button type="submit" className="bg-purple-600 hover:bg-purple-500 text-white px-8 py-4 rounded-2xl font-semibold whitespace-nowrap shadow-lg shadow-purple-900/20 transition-all flex items-center justify-center">Simpan Pesanan</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const JadwalPesanan = ({ orders, setOrders, catering, setCatering, transactions, setTransactions, showToast, searchTerm, setSearchTerm }) => {
            const handleStatus = (id, newStatus) => {
                const order = orders.find(o => o.id === id);
                if (newStatus === 'Selesai' && order.status !== 'Selesai') {
                    const sisaTagihan = order.total - (order.dp || 0);
                    if (sisaTagihan > 0) {
                        if (order.source.startsWith('Katering')) {
                            const katName = order.source.replace('Katering ', '');
                            if (catering[katName]) {
                                setCatering(prev => ({ ...prev, [katName]: { saldo: prev[katName].saldo - sisaTagihan, history: [{ id: Date.now(), date: new Date().toISOString(), type: 'pesanan', amount: sisaTagihan, desc: `Potong Saldo (Selesai ID: ${id.toString().slice(-4)})` }, ...prev[katName].history] } }));
                                setTransactions(prev => [{ id: Date.now() + 1, date: new Date().toISOString(), type: 'potong_saldo', amount: sisaTagihan, desc: `Potong Saldo (Pesanan ${katName})` }, ...prev]);
                                showToast(`Pesanan selesai! Saldo ${katName} otomatis dipotong.`);
                            }
                        } else {
                            setTransactions(prev => [{ id: Date.now(), date: new Date().toISOString(), type: 'pemasukan', amount: sisaTagihan, desc: `Pelunasan: ${order.namaPemesan || 'Umum'} (ID: ${id.toString().slice(-4)})` }, ...prev]);
                            showToast(`Pesanan selesai! Pemasukan sisa tagihan dicatat.`);
                        }
                    } else { showToast('Pesanan selesai!'); }
                }
                setOrders(orders.map(o => o.id === id ? {...o, status: newStatus} : o));
            };

            const filteredOrders = orders.filter(o => {
                if (!searchTerm) return true;
                const term = searchTerm.toLowerCase();
                return ( o.id.toString().includes(term) || o.source.toLowerCase().includes(term) || o.details.toLowerCase().includes(term) || (o.namaPemesan && o.namaPemesan.toLowerCase().includes(term)) );
            });

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
                        <div><h2 className="text-2xl font-medium text-white tracking-tight">Antrean Jadwal Pesanan</h2><p className="text-sm text-slate-400 mt-1">Pantau status penyelesaian pesanan berjalan.</p></div>
                        <div className="relative w-full md:w-80">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icons.Search size={18} className="text-slate-500" /></div>
                            <input type="text" placeholder="Cari ID / data pesanan..." className="w-full pl-12 pr-4 py-3 bg-[#15161c] border border-white/5 rounded-full focus:ring-2 focus:ring-purple-500/50 outline-none text-sm text-white placeholder-slate-500 shadow-lg shadow-black/10 transition-all" value={searchTerm || ''} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>
                    </div>

                    {orders.length === 0 ? (
                        <div className="bg-[#15161c] rounded-3xl border border-white/5 p-16 text-center shadow-xl flex flex-col items-center">
                            <div className="w-20 h-20 bg-[#0d0e12] rounded-full flex items-center justify-center border border-white/5 mb-4"><Icons.CalendarDays size={32} className="text-slate-600"/></div>
                            <h3 className="text-xl font-medium text-slate-300">Belum Ada Pesanan</h3><p className="text-slate-500 mt-2 text-sm">Pesanan baru akan muncul di dashboard ini.</p>
                        </div>
                    ) : filteredOrders.length === 0 ? (
                        <div className="bg-[#15161c] rounded-3xl border border-white/5 p-16 text-center shadow-xl flex flex-col items-center">
                            <Icons.Search size={32} className="text-slate-600 mb-4"/><h3 className="text-xl font-medium text-slate-300">Pencarian Tidak Ditemukan</h3><p className="text-slate-500 mt-2 text-sm">Tidak ada pesanan yang cocok dengan kata kunci tersebut.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                            {filteredOrders.map(order => (
                                <div key={order.id} className={`p-6 rounded-3xl border transition-all duration-300 relative overflow-hidden flex flex-col group ${order.status === 'Selesai' ? 'bg-[#0d0e12] border-white/5 opacity-60' : order.status === 'Batal' ? 'bg-[#120a0d] border-rose-500/10 opacity-60' : 'bg-[#15161c] border-purple-500/20 shadow-xl shadow-purple-900/10 hover:border-purple-500/40'}`}>
                                    <div className="flex justify-between items-start mb-5 relative z-10">
                                        <div className="flex items-center space-x-3"><div className="bg-[#0d0e12] p-2 rounded-xl border border-white/5"><Icons.User size={16} className="text-slate-400" /></div><span className="font-semibold text-white tracking-wide">{order.source}</span></div>
                                        <div className="flex items-center space-x-2">{order.status === 'Pending' && <span className="w-2 h-2 rounded-full bg-purple-500 shadow-[0_0_8px_rgba(168,85,247,0.8)] animate-pulse"></span>}<span className="text-xs text-slate-400 font-medium uppercase tracking-widest">{order.status}</span></div>
                                    </div>
                                    <div className="relative z-10 flex-grow flex flex-col">
                                        <div className="flex justify-between items-center mb-3">
                                            <p className="text-xs text-slate-500 flex items-center font-medium"><Icons.Clock size={12} className="mr-1.5"/> {formatDate(order.date)}</p>
                                            <span className="text-[10px] text-slate-600 font-mono">ID: {order.id.toString().slice(-4)}</span>
                                        </div>
                                        <div className="bg-[#0d0e12] border border-white/5 p-4 rounded-2xl mb-5 flex-grow"><p className="text-slate-300 font-medium whitespace-pre-wrap text-sm leading-relaxed">{order.details}</p></div>
                                        {order.total > 0 && (
                                            <div className="mb-5 p-4 bg-black/20 border border-white/5 rounded-2xl flex justify-between items-center text-xs">
                                                <div className="flex flex-col"><span className="text-slate-500 mb-1">Total Harga</span><span className="font-semibold text-emerald-400 text-sm">{formatRupiah(order.total)}</span></div>
                                                <div className="flex flex-col text-right"><span className="text-slate-500 mb-1">Sisa Tagihan</span><span className="font-semibold text-slate-200 text-sm">{formatRupiah(order.total - (order.dp || 0))}</span></div>
                                            </div>
                                        )}
                                        {order.status === 'Pending' && (
                                            <div className="flex space-x-3 mt-auto pt-2 border-t border-white/5">
                                                <button onClick={() => handleStatus(order.id, 'Selesai')} className="flex-1 py-2.5 bg-purple-600 hover:bg-purple-500 text-white text-xs font-semibold rounded-xl transition-colors shadow-lg shadow-purple-900/20">Tandai Selesai</button>
                                                <button onClick={() => handleStatus(order.id, 'Batal')} className="py-2.5 px-4 bg-[#0d0e12] hover:bg-rose-500/10 text-slate-400 hover:text-rose-400 border border-white/5 text-xs font-semibold rounded-xl transition-colors">Batal</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const KeuanganKambing = ({ goatSuppliers, setGoatSuppliers, transactions, setTransactions, showToast }) => {
            const [form, setForm] = useState({ supplierId: goatSuppliers[0]?.id || '', type: 'tambah_hutang', amount: '' });
            const [isAdding, setIsAdding] = useState(false);
            const [newName, setNewName] = useState('');
            const [confirmDelete, setConfirmDelete] = useState(null);

            useEffect(() => { if (goatSuppliers.length > 0 && !goatSuppliers.find(s => s.id === parseInt(form.supplierId))) { setForm(prev => ({ ...prev, supplierId: goatSuppliers[0].id })); } }, [goatSuppliers, form.supplierId]);

            const handleAddSupplier = (e) => {
                e.preventDefault(); if(!newName.trim()) return;
                const newSupplier = { id: Date.now(), name: newName, hutang: 0, lastTx: null };
                setGoatSuppliers([...goatSuppliers, newSupplier]); setNewName(''); setIsAdding(false); showToast(`Pedagang ditambahkan.`); setForm(prev => ({ ...prev, supplierId: newSupplier.id }));
            };

            const handleDeleteSupplier = (id, name) => {
                if(confirmDelete === id) { setGoatSuppliers(goatSuppliers.filter(s => s.id !== id)); setConfirmDelete(null); showToast(`Pedagang dihapus.`); } else { setConfirmDelete(id); setTimeout(() => setConfirmDelete(null), 3000); }
            };

            const handleKambingTx = (e) => {
                e.preventDefault(); if (goatSuppliers.length === 0) return showToast('Tambah pedagang dulu!');
                const amount = unformatRibuan(form.amount); if(!amount) return;
                const dateStr = new Date().toISOString(); const supplierName = goatSuppliers.find(s => s.id === parseInt(form.supplierId))?.name || 'Pedagang';

                setGoatSuppliers(suppliers => suppliers.map(s => { if(s.id === parseInt(form.supplierId)) { return { ...s, hutang: form.type === 'tambah_hutang' ? s.hutang + amount : s.hutang - amount, lastTx: dateStr }; } return s; }));

                if(form.type === 'bayar_hutang') { setTransactions([{ id: Date.now(), date: dateStr, type: 'pengeluaran', amount, desc: `Bayar Hutang / Deposit: ${supplierName}` }, ...transactions]); showToast(`Pembayaran dicatat.`); } else { setTransactions([{ id: Date.now(), date: dateStr, type: 'hutang_kambing', amount, desc: `Ambil Kambing: ${supplierName}` }, ...transactions]); showToast(`Hutang ditambahkan.`); }
                setForm({...form, amount: ''});
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
                        <div><h2 className="text-2xl font-medium text-white tracking-tight">Suplier Kambing</h2><p className="text-sm text-slate-400 mt-1">Pantau hutang dan tagihan pedagang kambing.</p></div>
                        {isAdding ? (
                            <form onSubmit={handleAddSupplier} className="flex items-center space-x-1 bg-[#0d0e12] p-1 rounded-xl border border-white/10">
                                <input autoFocus type="text" value={newName} onChange={e => setNewName(e.target.value)} placeholder="Nama..." className="w-40 text-sm px-3 py-2 outline-none font-medium text-white bg-transparent"/>
                                <button type="submit" className="bg-emerald-500 text-[#0d0e12] p-2 rounded-lg"><Icons.CheckCircle size={16}/></button>
                                <button type="button" onClick={() => setIsAdding(false)} className="bg-white/10 text-slate-300 p-2 rounded-lg"><Icons.X size={16}/></button>
                            </form>
                        ) : (
                            <button onClick={() => setIsAdding(true)} className="px-5 py-2.5 rounded-full font-semibold text-sm text-purple-400 bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/20 flex items-center transition-all"><Icons.Plus size={16} className="mr-2"/> Tambah Suplier</button>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-7 space-y-4">
                            {goatSuppliers.length === 0 ? (
                                <div className="bg-[#15161c] rounded-3xl border border-white/5 p-12 text-center shadow-xl"><Icons.Beef size={48} className="mx-auto text-slate-600 mb-4"/><h3 className="text-xl font-medium text-slate-300">Belum Ada Pedagang</h3></div>
                            ) : (
                                goatSuppliers.map(supplier => (
                                    <div key={supplier.id} className="bg-[#15161c] p-6 rounded-3xl border border-white/5 shadow-xl hover:border-white/10 transition-colors flex flex-col md:flex-row md:justify-between md:items-center relative group">
                                        <button onClick={() => handleDeleteSupplier(supplier.id, supplier.name)} className={`absolute top-4 right-4 p-2 rounded-lg text-white transition-all opacity-0 group-hover:opacity-100 ${confirmDelete === supplier.id ? 'bg-rose-500 animate-pulse opacity-100' : 'bg-[#0d0e12] hover:bg-rose-500 border border-white/5'}`}>{confirmDelete === supplier.id ? <Icons.Trash2 size={14} /> : <Icons.X size={14} />}</button>
                                        <div className="mb-4 md:mb-0"><h4 className="font-semibold text-lg text-white flex items-center pr-10"><Icons.Beef size={18} className="mr-2 text-slate-500"/> {supplier.name}</h4><p className="text-xs text-slate-500 mt-1.5 flex items-center"><Icons.Clock size={12} className="mr-1"/> Update: {formatDate(supplier.lastTx)}</p></div>
                                        <div className="md:text-right">
                                            <p className="text-[10px] font-medium text-slate-500 uppercase tracking-widest mb-1">
                                                {supplier.hutang > 0 ? 'Tagihan Aktif' : supplier.hutang < 0 ? 'Saldo Deposit' : 'Tagihan / Saldo'}
                                            </p>
                                            <div className={`text-xl font-semibold px-4 py-2 rounded-xl inline-flex items-center border ${supplier.hutang > 0 ? 'bg-rose-500/10 text-rose-400 border-rose-500/20' : supplier.hutang < 0 ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-white/5 text-slate-400 border-white/10'}`}>
                                                {supplier.hutang > 0 && <Icons.TrendingDown size={18} className="mr-2" />}
                                                {supplier.hutang < 0 && <Icons.TrendingUp size={18} className="mr-2" />}
                                                {supplier.hutang > 0 ? '-' : supplier.hutang < 0 ? '+' : ''}{formatRupiah(Math.abs(supplier.hutang))}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        <div className="lg:col-span-5 bg-[#15161c] p-6 md:p-8 rounded-3xl border border-white/5 shadow-xl h-fit sticky top-6">
                            <div className="flex items-center space-x-3 mb-6 pb-4 border-b border-white/5"><div className="bg-purple-500/10 p-2 rounded-xl text-purple-400"><Icons.ArrowRightLeft size={20}/></div><h3 className="text-lg font-medium text-white">Transaksi Pedagang</h3></div>
                            <form onSubmit={handleKambingTx} className="space-y-6">
                                <div>
                                    <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2">Pilih Pedagang</label>
                                    <select className="w-full p-4 bg-[#0d0e12] border border-[#2a2b36] rounded-2xl outline-none focus:ring-2 focus:ring-purple-500/50 text-white font-medium disabled:opacity-50 appearance-none" value={form.supplierId} onChange={e => setForm({...form, supplierId: e.target.value})} disabled={goatSuppliers.length === 0}>{goatSuppliers.length === 0 && <option value="">Kosong...</option>}{goatSuppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2">Tipe</label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <label className={`border rounded-2xl p-4 cursor-pointer flex flex-col items-center text-center transition-all ${form.type === 'tambah_hutang' ? 'border-purple-500 bg-purple-500/10' : 'border-[#2a2b36] bg-[#0d0e12] hover:border-white/20'}`}><input type="radio" name="type" className="sr-only" onChange={() => setForm({...form, type: 'tambah_hutang'})} checked={form.type === 'tambah_hutang'}/><Icons.Beef size={20} className={form.type === 'tambah_hutang' ? 'text-purple-400 mb-2' : 'text-slate-500 mb-2'}/><span className={`text-xs font-semibold ${form.type === 'tambah_hutang' ? 'text-purple-300' : 'text-slate-400'}`}>Ambil<br/>(Hutang +)</span></label>
                                        <label className={`border rounded-2xl p-4 cursor-pointer flex flex-col items-center text-center transition-all ${form.type === 'bayar_hutang' ? 'border-emerald-500 bg-emerald-500/10' : 'border-[#2a2b36] bg-[#0d0e12] hover:border-white/20'}`}><input type="radio" name="type" className="sr-only" onChange={() => setForm({...form, type: 'bayar_hutang'})} checked={form.type === 'bayar_hutang'}/><Icons.DollarSign size={20} className={form.type === 'bayar_hutang' ? 'text-emerald-400 mb-2' : 'text-slate-500 mb-2'}/><span className={`text-xs font-semibold ${form.type === 'bayar_hutang' ? 'text-emerald-300' : 'text-slate-400'}`}>Bayar<br/>(Hutang -)</span></label>
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-2">Nominal (Rp)</label>
                                    <input type="text" className="w-full p-4 bg-[#0d0e12] border border-[#2a2b36] rounded-2xl outline-none focus:ring-2 focus:ring-purple-500/50 text-white font-medium disabled:opacity-50 placeholder-slate-600" placeholder="0" value={form.amount} onChange={e => setForm({...form, amount: formatRibuanInput(e.target.value)})} disabled={goatSuppliers.length === 0} />
                                </div>
                                <button type="submit" disabled={goatSuppliers.length === 0} className="w-full py-4 mt-2 bg-purple-600 hover:bg-purple-500 disabled:bg-slate-800 disabled:text-slate-500 text-white font-semibold rounded-2xl transition-all shadow-lg shadow-purple-900/20">Kirim Data</button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        // --- KOMPONEN UTAMA (APP) ---
        function App() {
            const [activeTab, setActiveTab] = useState('beranda');
            const [globalSearchTerm, setGlobalSearchTerm] = useState('');
            const [transactions, setTransactions] = useState(initialTransactions);
            const [catering, setCatering] = useState(initialCatering);
            const [orders, setOrders] = useState(initialOrders);
            const [goatSuppliers, setGoatSuppliers] = useState(initialGoatSuppliers);
            const [toastMessage, setToastMessage] = useState('');
            const [showToastObj, setShowToastObj] = useState(false);
            const [isNotifOpen, setIsNotifOpen] = useState(false);
            
            // Ref untuk mendeteksi klik di luar notif box
            const notifRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (notifRef.current && !notifRef.current.contains(event.target)) {
                        setIsNotifOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const showToast = (msg) => {
                setToastMessage(msg); setShowToastObj(true);
                setTimeout(() => setShowToastObj(false), 3000);
            };

            const pendingOrders = orders.filter(o => o.status === 'Pending');

            const stats = useMemo(() => {
                const calculate = (startDate) => {
                    let omset = 0; let pengeluaran = 0;
                    transactions.forEach(t => {
                        const tDate = new Date(t.date);
                        if (tDate >= startDate) {
                            if (t.type === 'pemasukan') omset += t.amount;
                            if (t.type === 'pengeluaran') pengeluaran += t.amount;
                        }
                    });
                    return { omset, pengeluaran, laba: omset - pengeluaran };
                };
                return { hariIni: calculate(startOfDay), mingguIni: calculate(startOfWeek), bulanIni: calculate(startOfMonth), tahunIni: calculate(startOfYear) };
            }, [transactions]);

            const SidebarItem = ({ icon: IconComponent, label, id, badge, tag }) => (
                <button
                    onClick={() => setActiveTab(id)}
                    className={`relative w-full flex items-center justify-between px-4 py-3 rounded-2xl mb-1.5 transition-all duration-200 group ${
                        activeTab === id ? 'bg-purple-500/10 text-purple-400' : 'text-slate-400 hover:bg-white/5 hover:text-slate-200'
                    }`}
                >
                    <div className="flex items-center space-x-3">
                        <IconComponent size={18} className={activeTab === id ? 'text-purple-400' : 'text-slate-500 group-hover:text-slate-300'} />
                        <span className="font-medium text-sm tracking-wide">{label}</span>
                    </div>
                    
                    <div className="flex items-center space-x-2">
                        {tag && <span className="bg-purple-600/20 text-purple-400 text-[9px] px-1.5 py-0.5 rounded uppercase font-bold tracking-wider border border-purple-500/20">{tag}</span>}
                        {badge > 0 && <span className="w-5 h-5 flex items-center justify-center bg-purple-600 text-white text-[10px] font-bold rounded-full shadow-[0_0_10px_rgba(168,85,247,0.5)]">{badge}</span>}
                    </div>
                </button>
            );

            return (
                <div className="h-screen w-full bg-[#0d0e12] flex font-sans text-slate-200 selection:bg-purple-500/30 overflow-hidden">
                    <Toast message={toastMessage} isVisible={showToastObj} />

                    {/* Sidebar */}
                    <aside className="w-64 bg-[#12131a] border-r border-[#1e1f28] flex flex-col flex-shrink-0 hidden md:flex h-full z-20">
                        <div className="p-6 pb-4">
                            <div className="flex items-center space-x-3 mb-1">
                                <div className="bg-white text-black p-1.5 rounded-lg"><Icons.Utensils size={18} /></div>
                                <h1 className="text-xl font-semibold tracking-tight text-white">SateGule<sup className="text-[10px] text-slate-400">®</sup></h1>
                            </div>
                            <p className="text-[10px] text-slate-500 uppercase tracking-widest pl-10">Dashboard Mgt</p>
                        </div>
                        
                        <div className="px-4 py-2 flex space-x-2">
                            <button className="flex-1 bg-white/10 text-white text-xs font-semibold py-2 rounded-xl">POS</button>
                            <button className="flex-1 text-slate-500 hover:text-white text-xs font-semibold py-2 rounded-xl transition-colors">Admin</button>
                        </div>

                        <nav className="flex-1 px-3 py-4 overflow-y-auto custom-scrollbar">
                            <p className="text-[10px] font-semibold text-slate-600 uppercase tracking-widest mb-3 px-4 flex items-center"><Icons.LayoutDashboard size={12} className="mr-2"/> Menu Utama</p>
                            <SidebarItem id="beranda" icon={Icons.Activity} label="Ringkasan" />
                            <SidebarItem id="transaksi" icon={Icons.ArrowRightLeft} label="Transaksi Kasir" />
                            <SidebarItem id="laporan" icon={Icons.FileText} label="Laporan Data" tag="API" />
                            <div className="my-6 border-t border-[#1e1f28] mx-4"></div>
                            <p className="text-[10px] font-semibold text-slate-600 uppercase tracking-widest mb-3 px-4 flex items-center"><Icons.Briefcase size={12} className="mr-2"/> Manajemen</p>
                            <SidebarItem id="katering" icon={Icons.Briefcase} label="Katering" />
                            <SidebarItem id="tambah_pesanan" icon={Icons.Plus} label="Pesanan Baru" />
                            <SidebarItem id="jadwal_pesanan" icon={Icons.CalendarDays} label="Jadwal Pesanan" badge={pendingOrders.length} />
                            <div className="my-6 border-t border-[#1e1f28] mx-4"></div>
                            <p className="text-[10px] font-semibold text-slate-600 uppercase tracking-widest mb-3 px-4 flex items-center"><Icons.Beef size={12} className="mr-2"/> Sumber Daya</p>
                            <SidebarItem id="kambing" icon={Icons.Beef} label="Suplier Kambing" />
                        </nav>
                        
                        <div className="p-4 m-3 bg-[#15161c] border border-white/5 rounded-2xl flex items-center justify-between group cursor-pointer hover:border-white/10 transition-colors">
                            <div className="flex items-center space-x-3">
                                <div className="w-8 h-8 rounded-full bg-[#1e1f28] flex items-center justify-center border border-white/10"><Icons.User size={14} className="text-slate-400"/></div>
                                <div><p className="text-xs font-semibold text-white">Admin Utama</p><p className="text-[10px] text-purple-400 uppercase tracking-wider">Pro</p></div>
                            </div>
                            <Icons.MoreHorizontal size={16} className="text-slate-600 group-hover:text-white transition-colors"/>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0 bg-[#0d0e12] h-screen relative">
                        
                        {/* Header */}
                        <header className="flex-shrink-0 border-b border-white/5 px-6 py-4 flex justify-between items-center z-20 bg-[#0d0e12]/80 backdrop-blur-md sticky top-0">
                            <div className="hidden md:block">
                                <h2 className="text-xs font-medium text-slate-400 flex items-center"><Icons.Clock size={12} className="mr-2"/> {formatDate(today.toISOString())}</h2>
                            </div>
                            
                            <div className="md:hidden flex items-center space-x-2">
                                <div className="bg-white p-1.5 rounded-md text-black"><Icons.Utensils size={14} /></div>
                                <h1 className="text-lg font-semibold text-white">SateGule</h1>
                            </div>

                            <div className="flex items-center space-x-4">
                                <div className="hidden md:flex relative">
                                    <Icons.Search size={14} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-500" />
                                    <input 
                                        type="text" placeholder="Cari riwayat / pesanan..." value={globalSearchTerm}
                                        onChange={(e) => {
                                            const term = e.target.value; setGlobalSearchTerm(term);
                                            if (term.trim() !== '') {
                                                const lowerTerm = term.toLowerCase();
                                                const matchOrder = orders.some(o => o.id.toString().includes(lowerTerm) || o.source.toLowerCase().includes(lowerTerm) || o.details.toLowerCase().includes(lowerTerm) || (o.namaPemesan && o.namaPemesan.toLowerCase().includes(lowerTerm)));
                                                const matchTx = transactions.some(t => t.desc.toLowerCase().includes(lowerTerm) || t.amount.toString().includes(lowerTerm));
                                                if (matchOrder && !matchTx && activeTab !== 'jadwal_pesanan') setActiveTab('jadwal_pesanan');
                                                else if (matchTx && activeTab !== 'laporan') setActiveTab('laporan');
                                                else if (!matchOrder && !matchTx && activeTab !== 'laporan' && activeTab !== 'jadwal_pesanan') setActiveTab('laporan');
                                            }
                                        }}
                                        className="bg-[#15161c] border border-white/5 rounded-full pl-9 pr-4 py-1.5 text-xs text-white focus:outline-none focus:border-purple-500/50 w-64 transition-all"
                                    />
                                </div>
                                
                                {/* Ikon Notifikasi (Bell) & Dropdown */}
                                <div className="relative" ref={notifRef}>
                                    <button 
                                        onClick={() => setIsNotifOpen(!isNotifOpen)} 
                                        className={`relative p-2 rounded-full transition-colors ${isNotifOpen ? 'bg-white/10 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}
                                    >
                                        <Icons.Bell size={18} />
                                        {pendingOrders.length > 0 && <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-purple-500 border-2 border-[#0d0e12] rounded-full"></span>}
                                    </button>

                                    {/* Popover/Dropdown Notifikasi */}
                                    {isNotifOpen && (
                                        <div className="absolute top-full right-0 mt-3 w-80 bg-[#15161c] border border-white/10 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.8)] overflow-hidden z-50 animate-fade-in origin-top-right">
                                            <div className="p-4 border-b border-white/5 flex justify-between items-center bg-[#1a1b23]">
                                                <h4 className="font-semibold text-white text-sm">Pesanan Menunggu</h4>
                                                <span className="text-xs bg-purple-500/20 border border-purple-500/30 text-purple-400 px-2 py-0.5 rounded-full font-bold">{pendingOrders.length}</span>
                                            </div>
                                            <div className="max-h-72 overflow-y-auto custom-scrollbar">
                                                {pendingOrders.length === 0 ? (
                                                    <div className="p-8 text-center flex flex-col items-center">
                                                        <Icons.CheckCircle size={24} className="text-emerald-500/50 mb-2"/>
                                                        <p className="text-sm text-slate-500">Semua pesanan sudah selesai.</p>
                                                    </div>
                                                ) : (
                                                    pendingOrders.map(po => (
                                                        <div 
                                                            key={po.id}
                                                            onClick={() => {
                                                                setActiveTab('jadwal_pesanan');
                                                                setGlobalSearchTerm(po.id.toString());
                                                                setIsNotifOpen(false);
                                                            }}
                                                            className="p-4 border-b border-white/5 hover:bg-purple-500/10 cursor-pointer transition-colors group"
                                                        >
                                                            <div className="flex justify-between items-start mb-1">
                                                                <p className="text-sm font-semibold text-slate-200 group-hover:text-purple-300 transition-colors">{po.source}</p>
                                                                <span className="text-[10px] text-slate-500 font-mono">#{po.id.toString().slice(-4)}</span>
                                                            </div>
                                                            <p className="text-xs text-slate-400 mt-1 line-clamp-2 leading-relaxed">{po.details}</p>
                                                            <p className="text-[10px] text-purple-400 mt-2 flex items-center"><Icons.Clock size={10} className="mr-1"/>{formatDate(po.date)}</p>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                            {pendingOrders.length > 0 && (
                                                <div className="p-2 border-t border-white/5 bg-[#0d0e12]">
                                                    <button onClick={() => { setActiveTab('jadwal_pesanan'); setIsNotifOpen(false); }} className="w-full py-2 text-xs font-semibold text-slate-400 hover:text-white transition-colors">
                                                        Lihat Semua Jadwal
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className="md:hidden">
                                    <select className="bg-[#15161c] p-2 rounded-xl text-xs font-medium text-white outline-none border border-white/5" value={activeTab} onChange={(e) => setActiveTab(e.target.value)}>
                                        <option value="beranda">Ringkasan</option><option value="transaksi">Transaksi</option><option value="laporan">Laporan Data</option><option value="katering">Katering</option><option value="tambah_pesanan">Pesanan Baru</option><option value="jadwal_pesanan">Jadwal Pesanan</option><option value="kambing">Suplier</option>
                                    </select>
                                </div>
                            </div>
                        </header>

                        {/* Konten Tab */}
                        <div className="flex-1 relative w-full overflow-hidden">
                            <div className={`absolute inset-0 overflow-y-auto p-4 md:p-8 custom-scrollbar ${activeTab === 'beranda' ? 'block' : 'hidden'}`}><div className="max-w-6xl mx-auto"><Beranda stats={stats} transactions={transactions} setTab={setActiveTab} orders={orders} /></div></div>
                            <div className={`absolute inset-0 overflow-y-auto p-4 md:p-8 custom-scrollbar ${activeTab === 'transaksi' ? 'block' : 'hidden'}`}><div className="max-w-6xl mx-auto"><Transaksi transactions={transactions} setTransactions={setTransactions} showToast={showToast} /></div></div>
                            <div className={`absolute inset-0 overflow-y-auto p-4 md:p-8 custom-scrollbar ${activeTab === 'laporan' ? 'block' : 'hidden'}`}><div className="max-w-6xl mx-auto"><Laporan transactions={transactions} searchTerm={globalSearchTerm} setSearchTerm={setGlobalSearchTerm} /></div></div>
                            <div className={`absolute inset-0 overflow-y-auto p-4 md:p-8 custom-scrollbar ${activeTab === 'katering' ? 'block' : 'hidden'}`}><div className="max-w-6xl mx-auto"><KeuanganKatering catering={catering} setCatering={setCatering} transactions={transactions} setTransactions={setTransactions} orders={orders} showToast={showToast} /></div></div>
                            <div className={`absolute inset-0 overflow-y-auto p-4 md:p-8 custom-scrollbar ${activeTab === 'tambah_pesanan' ? 'block' : 'hidden'}`}><div className="max-w-6xl mx-auto"><FormTambahPesanan orders={orders} setOrders={setOrders} catering={catering} transactions={transactions} setTransactions={setTransactions} showToast={showToast} /></div></div>
                            <div className={`absolute inset-0 overflow-y-auto p-4 md:p-8 custom-scrollbar ${activeTab === 'jadwal_pesanan' ? 'block' : 'hidden'}`}><div className="max-w-6xl mx-auto"><JadwalPesanan orders={orders} setOrders={setOrders} catering={catering} setCatering={setCatering} transactions={transactions} setTransactions={setTransactions} showToast={showToast} searchTerm={globalSearchTerm} setSearchTerm={setGlobalSearchTerm} /></div></div>
                            <div className={`absolute inset-0 overflow-y-auto p-4 md:p-8 custom-scrollbar ${activeTab === 'kambing' ? 'block' : 'hidden'}`}><div className="max-w-6xl mx-auto"><KeuanganKambing goatSuppliers={goatSuppliers} setGoatSuppliers={setGoatSuppliers} transactions={transactions} setTransactions={setTransactions} showToast={showToast} /></div></div>
                        </div>
                    </main>
                </div>
            );
        }

        // --- RENDER APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
